# Configuration Upptime — status page Kotbo
# Docs : https://upptime.js.org/docs/configuration
#
# ⚠️  Seul fichier à éditer à la main : voir AGENTS.md.
#     Les workflows, api/, graphs/, history/ sont générés automatiquement.

owner: Kotbo-Bot
repo: kotbo-status

# Notifications Discord : gérées par le secret NOTIFICATION_DISCORD_WEBHOOK_URL
# (Upptime lit ce secret directement, pas de config YAML nécessaire).

sites:
  - name: API Kotbo
    url: https://api.kotbo.fr/health
  - name: Bot Discord
    url: https://api.kotbo.fr/health/discord
  - name: Base de données
    url: https://api.kotbo.fr/health/db
  - name: Redis
    url: https://api.kotbo.fr/health/redis
  - name: Dashboard
    url: https://dash.kotbo.fr

status-website:
  cname: status.kotbo.fr
  name: Kotbo Status
  # thème de base clair — surchargé par le bloc `css` ci-dessous (chargé après)
  theme: light
  introTitle: 'État des services <span class="accent">Kotbo</span>'
  introMessage: Statut en temps réel du bot Discord, de l'API, du dashboard et de l'infrastructure Kotbo. Propulsé par Upptime — aucun serveur requis.
  navbar:
    - title: Statut
      href: /
    - title: Dashboard
      href: https://dash.kotbo.fr
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

  # ---- Polices Kotbo (Manrope / Inter / Caveat) ----
  customHeadHtml: |
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800;900&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">

  # ---- Habillage « whiteboard / post-it » (style kotbo.fr) ----
  css: |
    :root {
      --k-board: #f8f9fa;
      --k-ink: #14161c;
      --k-ink-soft: #565b66;
      --k-primary: #625fff;
      --k-line: rgba(20, 22, 28, 0.12);
      --k-postit-pink: #ffb7b2;
      --k-postit-yellow: #fdfd96;
      --k-postit-blue: #aec6cf;
      --k-marker-red: #ff4d4d;
      --k-up: #00bb7f;
      --k-down: #ff2357;
      --k-tape: rgba(253, 253, 150, 0.62);
      --body-background-color: var(--k-board);
      --body-text-color: var(--k-ink);
      --card-background-color: #ffffff;
      --card-border-color: var(--k-line);
      --up-border-left-color: var(--k-up);
      --down-border-left-color: var(--k-down);
      --degraded-border-left-color: #f9a900;
      --graph-opacity: 0.9;
    }

    /* fond tableau blanc à pois */
    html, body {
      background-color: var(--k-board) !important;
      background-image: radial-gradient(rgba(20, 22, 28, 0.09) 1.4px, transparent 1.5px);
      background-size: 22px 22px;
      background-attachment: fixed;
      color: var(--k-ink);
      font-family: "Inter", ui-sans-serif, system-ui, sans-serif !important;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, h4 {
      font-family: "Manrope", "Inter", sans-serif !important;
      color: var(--k-ink);
      letter-spacing: -0.02em;
    }

    /* barre de navigation */
    nav {
      background: rgba(248, 249, 250, 0.82) !important;
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--k-line) !important;
      font-weight: 500 !important;
    }
    nav ul { justify-content: flex-start !important; gap: 0.25rem; }
    nav ul li a {
      padding: 1.1rem 1rem !important;
      color: var(--k-ink-soft);
      font-weight: 600;
      border-radius: 999px;
      transition: color 0.15s;
    }
    nav ul li a:hover { color: var(--k-ink); background: rgba(20, 22, 28, 0.05); }
    nav [aria-current] {
      border-bottom: 0 !important;
      color: var(--k-primary) !important;
      background: rgba(98, 95, 255, 0.12) !important;
      font-weight: 700;
    }

    /* en-tête / intro */
    header { margin-bottom: 2.25rem !important; }
    header h1 {
      font-size: 2.6rem !important;
      font-weight: 800 !important;
      line-height: 1.05 !important;
      margin-bottom: 0.6rem !important;
    }
    header h1 .accent { color: var(--k-primary); }
    header p.lead {
      color: var(--k-ink-soft) !important;
      font-size: 1.05rem !important;
      max-width: 42rem;
    }

    /* titres de section avec soulignement marqueur */
    .f.changed h2,
    section > h2 {
      display: inline-block;
      font-size: 1.5rem !important;
      font-weight: 800 !important;
      padding-bottom: 0.35rem;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='12' viewBox='0 0 220 12'><path d='M2 8 C 40 2, 90 12, 130 6 S 200 2, 218 7' stroke='%23625fff' stroke-width='3.5' fill='none' stroke-linecap='round'/></svg>");
      background-repeat: no-repeat;
      background-position: left bottom;
      background-size: 190px 10px;
    }
    section > h3 {
      font-family: "Caveat", cursive !important;
      font-size: 1.5rem !important;
      color: var(--k-ink-soft) !important;
      opacity: 1 !important;
      transform: rotate(-1deg);
      margin-top: 1.5rem !important;
    }

    /* bloc « État en direct » + sélecteur de durée */
    .f.changed { align-items: center; margin-bottom: 1rem; }
    form.f.r { gap: 0.3rem; }
    form.r label {
      margin-left: 0 !important;
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      border: 1.5px solid var(--k-line);
      background: #fff;
      color: var(--k-ink-soft);
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    form.r label:hover { border-color: var(--k-primary); color: var(--k-ink); }
    form.r input:checked + label {
      background: var(--k-ink) !important;
      color: #fff !important;
      border-color: var(--k-ink);
      font-weight: 700 !important;
    }

    /* cartes de service (live status) : fiches post-it */
    section.live-status article {
      background: #fff !important;
      border: 1.5px solid var(--k-line) !important;
      border-left-width: 1.5px !important;
      border-radius: 14px !important;
      padding: 1.1rem 1.3rem !important;
      margin-top: 0.95rem !important;
      box-shadow: 0 3px 0 rgba(20, 22, 28, 0.05), 0 10px 22px -12px rgba(20, 22, 28, 0.18);
      transform: rotate(-0.45deg);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    section.live-status article:nth-child(even) { transform: rotate(0.5deg); }
    section.live-status article:nth-child(3n) { transform: rotate(-0.2deg); }
    section.live-status article:hover {
      transform: rotate(0deg) translateY(-2px);
      box-shadow: 0 4px 0 rgba(20, 22, 28, 0.06), 0 16px 30px -14px rgba(20, 22, 28, 0.28);
    }
    /* graphique de temps de réponse en filigrane teinté marque */
    section.live-status article.graph::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: var(--background);
      background-size: auto 62%;
      background-repeat: no-repeat;
      background-position: right -0.4rem bottom -0.2rem;
      filter: hue-rotate(78deg) saturate(0.95);
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }
    section.live-status article > * { position: relative; z-index: 1; }
    /* petit scotch en haut à gauche */
    section.live-status article::before {
      content: "";
      position: absolute;
      top: -0.5rem; left: 1.3rem;
      width: 2.8rem; height: 1.05rem;
      transform: rotate(-4deg);
      background: rgba(98, 95, 255, 0.16);
      border: 1px solid rgba(98, 95, 255, 0.14);
      z-index: 2;
    }
    section.live-status article h4 .icon { display: none; }
    section.live-status article h4 {
      font-size: 1.05rem !important;
      display: flex;
      align-items: center;
      gap: 0.15rem;
    }
    section.live-status article h4::before {
      content: "";
      width: 0.7rem; height: 0.7rem;
      border-radius: 999px;
      margin-right: 0.55rem;
      flex: 0 0 auto;
      background: var(--k-up);
      box-shadow: 0 0 0 4px rgba(0, 187, 127, 0.16);
    }
    section.live-status article.down h4::before {
      background: var(--k-down); box-shadow: 0 0 0 4px rgba(255, 35, 87, 0.16);
    }
    section.live-status article.degraded h4::before {
      background: #f9a900; box-shadow: 0 0 0 4px rgba(249, 169, 0, 0.16);
    }
    section.live-status article a { color: var(--k-ink) !important; font-weight: 700; }
    section.live-status article div { color: var(--k-ink-soft); }
    .data { font-weight: 700; color: var(--k-ink); }

    /* bannière « tous les services opérationnels » */
    article.up:not(.link) {
      background: linear-gradient(180deg, #eafff5, #d8fbec) !important;
      border: 1.5px solid rgba(0, 187, 127, 0.35) !important;
      border-radius: 16px !important;
      color: #067a53 !important;
      font-family: "Manrope", sans-serif !important;
      font-weight: 800 !important;
      font-size: 1.1rem !important;
      padding: 1.1rem 1.3rem !important;
      box-shadow: 0 3px 0 rgba(0, 187, 127, 0.12);
    }

    /* incidents passés = post-it inclinés avec scotch */
    section article.down.link,
    section article.degraded.link,
    section article.down-active {
      color: var(--k-ink) !important;
      border: none !important;
      border-radius: 3px !important;
      background: var(--k-postit-pink) !important;
      box-shadow: 0 8px 18px -8px rgba(20, 22, 28, 0.35);
      padding: 1.25rem 1.35rem 1.4rem !important;
      margin-top: 1.75rem !important;
      transform: rotate(-1.4deg);
      transition: transform 0.15s;
    }
    section article.down.link:nth-child(even),
    section article.degraded.link:nth-child(even) {
      background: var(--k-postit-blue) !important;
      transform: rotate(1.2deg);
    }
    section article.down.link:nth-child(3n),
    section article.degraded.link:nth-child(3n) {
      background: var(--k-postit-yellow) !important;
      transform: rotate(-0.6deg);
    }
    section article.down.link:hover { transform: rotate(0deg) scale(1.015); z-index: 2; }
    section article.down.link::before,
    section article.degraded.link::before,
    section article.down-active::before {
      content: "";
      position: absolute;
      top: -0.7rem; left: 50%;
      width: 4.5rem; height: 1.4rem;
      transform: translateX(-50%) rotate(-3deg);
      background: var(--k-tape);
      border: 1px solid rgba(20, 22, 28, 0.06);
      box-shadow: 0 2px 4px rgba(20, 22, 28, 0.08);
    }
    section article.down.link h4,
    section article.down-active h4 { font-weight: 800 !important; }
    section article.down.link a,
    section article.down-active a {
      color: var(--k-ink) !important;
      font-weight: 700;
      text-decoration: underline;
      text-decoration-color: var(--k-marker-red);
      text-decoration-thickness: 2px;
    }

    /* pied de page = post-it jaune manuscrit */
    footer { margin-top: 3.5rem !important; opacity: 1 !important; }
    footer p {
      display: inline-block;
      font-family: "Caveat", cursive;
      font-size: 1.15rem;
      color: var(--k-ink-soft);
      background: var(--k-postit-yellow);
      padding: 0.5rem 1.2rem;
      border-radius: 3px;
      transform: rotate(-1.2deg);
      box-shadow: 0 6px 14px -8px rgba(20, 22, 28, 0.3);
    }
    footer a { color: var(--k-primary) !important; }

    @media (max-width: 520px) {
      header h1 { font-size: 2rem !important; }
      form.f.r { width: 100%; margin-top: 0.5rem; }
    }

  # ---- Traductions dynamiques : titres d'incidents générés par Upptime ----
  # (« X is down » est codé en dur côté Upptime ; on le francise à l'affichage)
  js: |
    (function () {
      var rules = [
        [/\bis down\b/gi, "est hors service"],
        [/\bhas degraded performance\b/gi, "a des performances dégradées"],
        [/\bis up\b/gi, "est de nouveau opérationnel"]
      ];
      function translate() {
        var nodes = document.querySelectorAll("h1, h2, h3, h4");
        for (var i = 0; i < nodes.length; i++) {
          var el = nodes[i];
          if (el.children.length) continue;
          var text = el.textContent, out = text;
          for (var j = 0; j < rules.length; j++) out = out.replace(rules[j][0], rules[j][1]);
          if (out !== text) el.textContent = out;
        }
      }
      if (document.readyState !== "loading") translate();
      document.addEventListener("DOMContentLoaded", translate);
      new MutationObserver(translate).observe(document.documentElement, { childList: true, subtree: true });
    })();

# ---- Couleurs de marque pour le graphique Chart.js de la page historique ----
graphBorderColor: "#625fff"
graphBackgroundColor: "rgba(98, 95, 255, 0.14)"

